services:
  postgres:
    image: postgres:16-alpine
    container_name: rdportal_postgres
    environment:
      POSTGRES_USER: rdportal
      POSTGRES_PASSWORD: rdportal
      POSTGRES_DB: rdportal_dev
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rdportal -d rdportal_dev"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
