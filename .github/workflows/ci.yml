name: CI

on:
  push:
    branches: [main, out-of-scope]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9.12.0"
  TURBO_TELEMETRY_DISABLED: "1"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-lint-${{ github.sha }}
          restore-keys: |
            turbo-lint-

      - name: Lint
        run: pnpm turbo run lint

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-build-${{ github.sha }}
          restore-keys: |
            turbo-build-

      - name: Cache Next build
        uses: actions/cache@v4
        with:
          path: apps/web/.next/cache
          key: next-${{ hashFiles('apps/web/pnpm-lock.yaml', 'apps/web/**/*.[jt]s', 'apps/web/**/*.[jt]sx') }}
          restore-keys: |
            next-

      - name: Build
        run: pnpm turbo run build

  api-integration:
    name: API integration
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: rdportal
          POSTGRES_PASSWORD: rdportal
          POSTGRES_DB: rdportal_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rdportal -d rdportal_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://rdportal:rdportal@localhost:5432/rdportal_ci?schema=public

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply Prisma migrations
        run: pnpm --filter @rd-portal/api exec prisma migrate deploy

      - name: E2E
        run: pnpm --filter @rd-portal/api test:e2e
