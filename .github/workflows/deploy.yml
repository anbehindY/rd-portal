name: Deploy

on:
  push:
    branches: [main, out-of-scope]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # required for OIDC

env:
  AWS_REGION: ap-southeast-1
  CLUSTER: rd-portal
  API_SERVICE: rd-portal-api
  WEB_SERVICE: rd-portal-web
  API_REPO: rd-portal-api
  WEB_REPO: rd-portal-web
  ALB_NAME: rd-portal-alb

jobs:
  build-push:
    name: Build & push images
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.meta.outputs.sha }}
      alb_dns: ${{ steps.meta.outputs.alb_dns }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr

      - uses: docker/setup-buildx-action@v3

      - name: Compute metadata
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          ALB_DNS=$(aws elbv2 describe-load-balancers \
            --names "$ALB_NAME" \
            --query 'LoadBalancers[0].DNSName' --output text)
          echo "alb_dns=$ALB_DNS" >> "$GITHUB_OUTPUT"
          echo "ALB: $ALB_DNS · SHA: $SHORT_SHA"

      - name: Build & push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.API_REPO }}:${{ steps.meta.outputs.sha }}
            ${{ steps.ecr.outputs.registry }}/${{ env.API_REPO }}:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      - name: Build & push Web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          # Same-origin: web hits /api on its own ALB, no build-time URL needed.
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.WEB_REPO }}:${{ steps.meta.outputs.sha }}
            ${{ steps.ecr.outputs.registry }}/${{ env.WEB_REPO }}:latest
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max

  deploy:
    name: Roll ECS services
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Force new deployment
        run: |
          aws ecs update-service --cluster "$CLUSTER" --service "$API_SERVICE" --force-new-deployment --no-cli-pager >/dev/null
          aws ecs update-service --cluster "$CLUSTER" --service "$WEB_SERVICE" --force-new-deployment --no-cli-pager >/dev/null

      - name: Wait for services stable
        run: |
          aws ecs wait services-stable --cluster "$CLUSTER" --services "$API_SERVICE" "$WEB_SERVICE"

      - name: Summary
        run: |
          echo "Deployed \`${{ needs.build-push.outputs.sha }}\` → http://${{ needs.build-push.outputs.alb_dns }}" >> "$GITHUB_STEP_SUMMARY"
